services:
  postgres:
    image: postgres:16-alpine
    container_name: virtual-bingo-postgres
    environment:
      POSTGRES_DB: virtual_bingo
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: bingo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingo -d virtual_bingo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

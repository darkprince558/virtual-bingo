name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Go backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum
      - run: go test ./...
      - run: go vet ./...

  backend-postgres:
    name: Go backend with Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: virtual_bingo
          POSTGRES_USER: bingo
          POSTGRES_PASSWORD: bingo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bingo -d virtual_bingo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend-go
    env:
      DATABASE_URL: postgres://bingo:bingo@localhost:5432/virtual_bingo?sslmode=disable
      TEST_DATABASE_URL: postgres://bingo:bingo@localhost:5432/virtual_bingo?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache-dependency-path: backend-go/go.sum
      - run: go run ./cmd/migrate up
      - run: go test ./...

  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  ai-service:
    name: AI service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest
      - run: python -m pip check
